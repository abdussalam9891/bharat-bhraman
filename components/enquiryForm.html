<section id="enquiry-form" class="py-16 px-4 bg-gray-50">
  <div class="max-w-xl mx-auto">
    <p class="text-sm text-green-700 font-semibold uppercase tracking-widest text-center mb-2">Book This Tour</p>
    <h2 id="formTitle" class="text-3xl font-bold text-center text-gray-900 mb-2">Plan Your Trip</h2>
    <p class="text-center text-gray-500 mb-8">Fill in your details. We'll reach out within 15 minutes.</p>

    <form id="enquiryForm" action="https://api.web3forms.com/submit" method="POST"
          class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <input type="hidden" name="access_key"  value="1efdceae-c424-4b92-9a4d-9af4dcc8e156">
      <input type="hidden" name="redirect" value="false">
      <input type="hidden" id="formSubject" name="subject">
      <input type="hidden" id="formDestination" name="destination">

      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
          <input type="text" name="name" placeholder="Rahul Sharma" required
                 class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number *</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210" required
                 class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Travel Date</label>
          <input type="date" name="travel_date"
                 class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Group Size *</label>
          <select name="group_size" required
                  class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            <option value="" disabled selected>No. of people</option>
            <option>1–2 people</option>
            <option>3–4 people</option>
            <option>5–6 people</option>
            <option>7+ people</option>
          </select>
        </div>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Preferred Car</label>
        <select name="car_preference"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
          <option value="" disabled selected>Select a car (optional)</option>
          <option>Maruti Suzuki Dzire – ₹3,200/day</option>
              <option>Mahindra XUV700 – ₹4,500/day</option>
              <option> Tata Safari – ₹5,800/day</option>
              <option>Toyota Innova Crysta – ₹5,000/day</option>
               <option>Mahindra Scorpio N – ₹5,000/day</option>
                <option>Tata Nexon – ₹3,400/day</option>
              <option>Mahindra Thar 4x4 – ₹4,200/day</option>
              <option>Toyota Fortuner – ₹7,000/day</option>
              <option>Maruti Swift – ₹3,200/day</option>
              <option>Not sure – help me decide</option>
          
        </select>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Any special requests? (optional)</label>
        <textarea name="message" rows="3" placeholder="Budget, dietary needs, accessibility requirements..."
                  class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 resize-none"></textarea>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full bg-teal-700 hover:bg-teal-800 text-white font-semibold py-3.5 rounded-lg transition-colors duration-200 text-base">
        Book Trip →
      </button>
      <p class="text-center text-xs text-gray-400 mt-3">We reply within 15 minutes on WhatsApp</p>
    </form>
  </div>
</section>

<div id="successModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl">

    <h3 class="text-xl font-bold text-gray-900 mb-2">We got your request!</h3>
    <p class="text-gray-500 text-sm mb-6">Our team will reach out on WhatsApp within 15 minutes.</p>
    <button id="closeModal"
            class="w-full bg-teal-700 hover:bg-teal-800 text-white font-semibold py-3 rounded-lg transition-colors">
      Close
    </button>
  </div>
</div>

<script>
  const form = document.getElementById('enquiryForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.textContent = 'Sending...';
    btn.disabled = true;

    const data = new FormData(form);
    const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: data });
    const json = await res.json();

    if (json.success) {
      document.getElementById('successModal').classList.remove('hidden');
    } else {
      btn.textContent = window.formConfig?.buttonText || 'Book Trip →';
      btn.disabled = false;
      alert('Something went wrong. Please try again.');
    }
  });

  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('successModal').classList.add('hidden');
    form.reset();
    btn.textContent = window.formConfig?.buttonText || 'Book Trip →';
    btn.disabled = false;
  });
</script>
